
set $wallpaper '/media/mich/data/Art/2026/west-yorkshire-sunset/west yorkshire sunset-widescreen.jpg'

output "DP-3" {
    mode  2560x1440@74.893Hz
    pos 2560 1080
    transform normal
    scale 1.0
    scale_filter nearest
    adaptive_sync off
    dpms on
    bg $wallpaper stretch
}
output "HDMI-A-1" {
    mode  1920x1080@74.973Hz
    pos 640 0
    transform normal
    scale 1.0
    scale_filter nearest
    adaptive_sync off
    dpms on
    bg $wallpaper stretch
}
output "DP-2" {
    mode  2560x1440@74.893Hz
    pos 0 1080
    transform normal
    scale 1.0
    scale_filter nearest
    adaptive_sync off
    dpms on
    bg $wallpaper stretch
}
output "DP-1" {
    mode  1920x1080@74.973Hz
    pos 2560 0
    transform normal
    scale 1.0
    scale_filter nearest
    adaptive_sync off
    dpms on
    bg $wallpaper stretch
}
